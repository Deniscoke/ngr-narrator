<svg xmlns="http://www.w3.org/2000/svg" width="336" height="112" viewBox="0 0 336 112">
  <!-- Frame 1: Closed mouth -->
  <g id="frame1">
    <!-- Background: dark moody landscape -->
    <rect x="0" y="0" width="112" height="112" fill="#1a1a2e"/>
    <rect x="0" y="80" width="112" height="32" fill="#0f0f1e"/>
    <!-- Moon -->
    <circle cx="85" cy="25" r="8" fill="#6b7280" opacity="0.4"/>
    <!-- Hood -->
    <path d="M30,20 L82,20 L75,45 L37,45 Z" fill="#18181b"/>
    <path d="M28,45 L84,45 L80,70 L32,70 Z" fill="#27272a"/>
    <!-- Face shadow -->
    <rect x="40" y="40" width="32" height="25" fill="#09090b"/>
    <!-- Eyes -->
    <rect x="45" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <rect x="61" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <!-- Mouth closed -->
    <rect x="50" y="60" width="12" height="2" fill="#71717a"/>
  </g>

  <!-- Frame 2: Half-open mouth -->
  <g id="frame2" transform="translate(112,0)">
    <rect x="0" y="0" width="112" height="112" fill="#1a1a2e"/>
    <rect x="0" y="80" width="112" height="32" fill="#0f0f1e"/>
    <circle cx="85" cy="25" r="8" fill="#6b7280" opacity="0.4"/>
    <path d="M30,20 L82,20 L75,45 L37,45 Z" fill="#18181b"/>
    <path d="M28,45 L84,45 L80,70 L32,70 Z" fill="#27272a"/>
    <rect x="40" y="40" width="32" height="25" fill="#09090b"/>
    <rect x="45" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <rect x="61" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <!-- Mouth half-open -->
    <rect x="50" y="60" width="12" height="4" fill="#3f3f46"/>
    <rect x="51" y="61" width="10" height="2" fill="#18181b"/>
  </g>

  <!-- Frame 3: Open mouth -->
  <g id="frame3" transform="translate(224,0)">
    <rect x="0" y="0" width="112" height="112" fill="#1a1a2e"/>
    <rect x="0" y="80" width="112" height="32" fill="#0f0f1e"/>
    <circle cx="85" cy="25" r="8" fill="#6b7280" opacity="0.4"/>
    <path d="M30,20 L82,20 L75,45 L37,45 Z" fill="#18181b"/>
    <path d="M28,45 L84,45 L80,70 L32,70 Z" fill="#27272a"/>
    <rect x="40" y="40" width="32" height="25" fill="#09090b"/>
    <rect x="45" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <rect x="61" y="48" width="6" height="8" fill="#fbbf24" opacity="0.8"/>
    <!-- Mouth open -->
    <rect x="49" y="59" width="14" height="7" fill="#3f3f46"/>
    <rect x="50" y="60" width="12" height="5" fill="#18181b"/>
  </g>
</svg>
